<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Translator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header>
      <div class="brand">
        <img src="../icons/icon48.png" alt="" class="logo">
        <span class="brand-name">Hover Translator</span>
      </div>
      <label class="toggle" title="Enable/Disable">
        <input type="checkbox" id="toggle-enabled">
        <span class="toggle-slider"></span>
      </label>
    </header>

    <!-- Usage bar -->
    <div class="usage-section" id="usage-section">
      <div class="usage-label">
        <span>Today's usage</span>
        <span id="usage-count">0 / 100</span>
      </div>
      <div class="usage-bar">
        <div class="usage-bar-fill" id="usage-bar-fill"></div>
      </div>
    </div>

    <!-- Premium badge (hidden by default) -->
    <div class="premium-active" id="premium-active" style="display:none">
      <span>★ Premium active</span>
      <span class="premium-sub">Unlimited words</span>
    </div>

    <!-- Language selector -->
    <div class="section">
      <label class="section-label" for="target-lang">Translate to</label>
      <select id="target-lang" class="select">
        <option value="es">🇪🇸 Spanish</option>
        <option value="en">🇬🇧 English</option>
        <option value="de">🇩🇪 German</option>
        <option value="fr">🇫🇷 French</option>
        <option value="it">🇮🇹 Italian</option>
        <option value="pt">🇵🇹 Portuguese</option>
        <option value="nl">🇳🇱 Dutch</option>
        <option value="pl">🇵🇱 Polish</option>
        <option value="ru">🇷🇺 Russian</option>
        <option value="uk">🇺🇦 Ukrainian</option>
        <option value="zh">🇨🇳 Chinese</option>
        <option value="ja">🇯🇵 Japanese</option>
        <option value="ko">🇰🇷 Korean</option>
        <option value="ar">🇸🇦 Arabic</option>
        <option value="tr">🇹🇷 Turkish</option>
        <option value="sv">🇸🇪 Swedish</option>
        <option value="da">🇩🇰 Danish</option>
        <option value="fi">🇫🇮 Finnish</option>
        <option value="cs">🇨🇿 Czech</option>
        <option value="el">🇬🇷 Greek</option>
        <option value="hi">🇮🇳 Hindi</option>
        <option value="id">🇮🇩 Indonesian</option>
      </select>
    </div>

    <!-- Premium activation -->
    <div class="section" id="premium-section">
      <div class="premium-cta">
        <div class="premium-cta-text">
          <strong>Need more?</strong>
          <span>Unlimited for just €14.99</span>
        </div>
        <button id="btn-activate" class="btn-primary">Activate</button>
      </div>
    </div>

    <!-- Premium key input (hidden by default) -->
    <div class="section" id="key-section" style="display:none">
      <label class="section-label" for="premium-key">License key</label>
      <div class="key-input-row">
        <input type="text" id="premium-key" placeholder="HVTR-XXXXXXXX-YYYYYYYY" class="input">
        <button id="btn-validate" class="btn-primary">OK</button>
      </div>
      <p class="key-error" id="key-error" style="display:none">Invalid key. Make sure you copied it correctly.</p>
      <a href="https://promeseo.gumroad.com/l/szWkd" target="_blank" class="buy-link" id="buy-link">Buy license key →</a>
    </div>

    <!-- Footer -->
    <footer>
      <button id="btn-options" class="btn-link">⚙ Advanced settings</button>
    </footer>

  </div>
  <script src="popup.js"></script>
</body>
</html>
